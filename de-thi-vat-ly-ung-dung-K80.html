<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề thi Vật Lý Ứng Dụng K80 — 40 câu / 90 phút</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#5a5a58;--text3:#8a8a88;
  --border:#e0dfd8;--border2:#c8c7c0;
  --green:#0F6E56;--green-bg:#E1F5EE;--green-dark:#085041;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --coral:#993C1D;--coral-bg:#FAECE7;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2c;
    --text:#e8e8e4;--text2:#a8a8a4;--text3:#686866;
    --border:#3a3a38;--border2:#505050;
    --green:#5DCAA5;--green-bg:#04342C;--green-dark:#9FE1CB;
    --red:#F09595;--red-bg:#501313;
    --amber:#EF9F27;--amber-bg:#412402;
    --blue:#85B7EB;--blue-bg:#042C53;
    --purple:#AFA9EC;--purple-bg:#26215C;
    --coral:#F0997B;--coral-bg:#4A1B0C;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:1rem}
.container{max-width:780px;margin:0 auto;background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.exam-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2)}
.exam-title{font-size:16px;font-weight:600;margin-bottom:3px}
.exam-sub{font-size:12px;color:var(--text2)}
.exam-body{padding:1.25rem 1.5rem}
.timer-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--radius);padding:10px 14px;margin-bottom:1.25rem;border:1px solid var(--border)}
.timer-clock{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.04em;min-width:62px;color:var(--text)}
.timer-label{font-size:11px;color:var(--text3);margin-top:1px}
.timer-btns{margin-left:auto;display:flex;gap:6px}
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .15s,transform .1s}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.97)}
.btn-danger{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.btn-danger:hover{opacity:.85}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn:disabled{opacity:.4;cursor:default}
.progress-wrap{margin-bottom:1.25rem}
.progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:4px;margin-bottom:1.25rem}
.nav-btn{height:30px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--border2)}
.nav-btn.current{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.nav-btn.answered{background:var(--green);color:#fff;border-color:var(--green)}
.nav-btn.skipped{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.section-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-teal{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-coral{background:var(--coral-bg);color:var(--coral)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.diff-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;font-weight:500}
.diff-easy{background:var(--green-bg);color:var(--green)}
.diff-med{background:var(--amber-bg);color:var(--amber)}
.diff-hard{background:var(--coral-bg);color:var(--coral)}
.q-num{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.q-text{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:1rem;font-weight:500}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s;font-size:13px;line-height:1.55;color:var(--text)}
.opt:hover{border-color:var(--border2);background:var(--bg2)}
.opt.selected{border-color:var(--green);background:var(--green-bg);color:var(--green-dark)}
.opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green-dark)}
.opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.opt-key{font-weight:600;min-width:18px;flex-shrink:0}
.explanation{background:var(--bg2);border-left:2px solid var(--green);border-radius:0 var(--radius) var(--radius) 0;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:1rem}
.explanation strong{color:var(--text);font-weight:600}
.q-nav{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:.5rem}
.result-wrap{padding:0}
.result-hero{text-align:center;padding:2rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border)}
.result-score{font-size:56px;font-weight:700;color:var(--green);line-height:1}
.result-label{font-size:14px;color:var(--text2);margin-top:6px}
.result-grade{font-size:18px;font-weight:600;color:var(--text);margin-top:4px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--bg);padding:1rem;text-align:center}
.stat-n{font-size:24px;font-weight:600}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}
.result-actions{padding:1.25rem 1.5rem;display:flex;gap:8px;flex-wrap:wrap}
.chap-results{padding:0 1.5rem 1.5rem}
.chap-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.chap-row:last-child{border:none}
.chap-name{flex:1;color:var(--text2)}
.chap-score{font-weight:600;min-width:50px;text-align:right;font-size:13px}
.chap-bar{flex:2;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.chap-bar-fill{height:100%;background:var(--green);border-radius:2px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:1rem 1.5rem .5rem;border-top:1px solid var(--border)}
@media(max-width:600px){
  body{padding:.5rem}
  .exam-body{padding:1rem}
  .exam-header{padding:1rem}
  .result-score{font-size:44px}
  .nav-grid{grid-template-columns:repeat(auto-fill,minmax(30px,1fr))}
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const QS=[
{id:1,chap:"Cơ học chất lỏng",badge:"badge-blue",diff:"easy",q:"Trong phương trình liên tục của chất lỏng lý tưởng chảy dừng, nếu tiết diện ống giảm 4 lần thì vận tốc dòng chảy:",opts:["Tăng 4 lần","Giảm 4 lần","Tăng 2 lần","Không đổi"],ans:0,ex:"<strong>Phương trình liên tục:</strong> S₁v₁ = S₂v₂. Nếu S₂ = S₁/4 thì v₂ = 4v₁ → vận tốc tăng 4 lần."},
{id:2,chap:"Cơ học chất lỏng",badge:"badge-blue",diff:"med",q:"Theo định luật Poiseuille, lưu lượng chất lỏng qua ống phụ thuộc vào bán kính R theo tỉ lệ:",opts:["Tỉ lệ R¹","Tỉ lệ R²","Tỉ lệ R³","Tỉ lệ R⁴"],ans:3,ex:"<strong>Định luật Poiseuille:</strong> L = πR⁴Δp/(8ηl). Lưu lượng tỉ lệ R⁴. Đây là lý do mạch máu bị hẹp gây giảm lưu lượng mạnh."},
{id:3,chap:"Cơ học chất lỏng",badge:"badge-blue",diff:"hard",q:"Một ống có bán kính R = 2 mm, độ nhớt η = 0,001 Pa.s, chênh lệch áp suất Δp = 200 Pa, chiều dài l = 0,1 m. Lưu lượng (L) xấp xỉ:",opts:["2,51 × 10⁻⁷ m³/s","1,26 × 10⁻⁶ m³/s","6,28 × 10⁻⁸ m³/s","5,03 × 10⁻⁷ m³/s"],ans:0,ex:"<strong>Poiseuille:</strong> L = πR⁴Δp/(8ηl) = π×(0,002)⁴×200/(8×0,001×0,1) = π×1,6×10⁻¹¹×200/0,0008 ≈ 2,51×10⁻⁷ m³/s."},
{id:4,chap:"Hiện tượng bề mặt",badge:"badge-teal",diff:"easy",q:"Hiện tượng mao dẫn xảy ra do:",opts:["Định luật Bernoulli","Sức căng bề mặt và góc tiếp xúc","Áp suất thủy tĩnh đơn thuần","Lực nhớt của chất lỏng"],ans:1,ex:"Mao dẫn là kết quả của lực căng bề mặt tạo áp suất phụ dưới mặt khum kết hợp với góc tiếp xúc θ (dính ướt khi θ < 90°). Công thức Jurin: h = 2δcosθ/(rρg)."},
{id:5,chap:"Hiện tượng bề mặt",badge:"badge-teal",diff:"med",q:"Theo công thức Jurin, chiều cao mao dẫn h của nước (δ = 0,073 N/m, θ ≈ 0°, ρ = 1000 kg/m³) trong ống r = 0,5 mm gần bằng:",opts:["0,73 cm","1,49 cm","2,98 cm","5,96 cm"],ans:2,ex:"h = 2δcosθ/(rρg) = 2×0,073×1/(0,0005×1000×9,8) ≈ 0,146/4,9 ≈ 0,0298 m = 2,98 cm."},
{id:6,chap:"Hiện tượng bề mặt",badge:"badge-teal",diff:"easy",q:"Khi cho thêm chất hoạt động bề mặt vào dung dịch, hệ số sức căng bề mặt δ sẽ:",opts:["Tăng","Giảm","Không đổi","Tăng rồi giảm"],ans:1,ex:"Chất hoạt động bề mặt (surfactant) hấp phụ lên mặt phân cách pha, làm giảm δ. Đây là nguyên lý hoạt động của chất tẩy rửa và nhũ hóa."},
{id:7,chap:"Siêu âm",badge:"badge-amber",diff:"easy",q:"Trở kháng âm Z₀ của môi trường có đơn vị trong hệ SI là:",opts:["kg·m⁻³","Pa·s·m⁻¹ (Rayl)","N·m⁻²","J·m⁻³"],ans:1,ex:"<strong>Z₀ = ρ₀V₀</strong>, đơn vị = kg/m³ × m/s = kg·m⁻²·s⁻¹ = N·s·m⁻³ = Pa·s·m⁻¹, còn gọi là Rayl."},
{id:8,chap:"Siêu âm",badge:"badge-amber",diff:"med",q:"Hệ số phản xạ siêu âm R tại mặt phân cách giữa hai môi trường (chiếu thẳng góc) được tính theo công thức:",opts:["R = (Z₂ - Z₁)/(Z₂ + Z₁)","R = (Z₂ - Z₁)²/(Z₂ + Z₁)²","R = Z₁/Z₂","R = (Z₁ + Z₂)/(Z₁ - Z₂)²"],ans:1,ex:"Tại chiếu thẳng góc: <strong>R = (Z₂ − Z₁)²/(Z₂ + Z₁)²</strong>. Khi Z₁ ≈ Z₂ thì R ≈ 0, sóng truyền qua tốt. Đây là lý do dùng gel siêu âm."},
{id:9,chap:"Siêu âm",badge:"badge-amber",diff:"hard",q:"Hiện tượng Cavitation trong siêu âm tần số thấp (kHz) tạo ra nhiệt độ và áp suất cục bộ đạt:",opts:["~100°C và ~10 atm","~1000°C và ~100 atm","~5000°C và ~2000 atm","~500°C và ~50 atm"],ans:2,ex:"Khi vi bọt Cavitation sụp đổ không đối xứng, tạo ra nhiệt độ cục bộ ~5000°C và áp suất ~2000 atm trong tích tắc. Đây là cơ chế làm sạch siêu âm và xúc tác hóa học."},
{id:10,chap:"Siêu âm",badge:"badge-amber",diff:"med",q:"Trong chẩn đoán hình ảnh siêu âm y tế, dải tần số thường dùng là:",opts:["30 kHz – 150 kHz","10 Hz – 20 kHz","2 MHz – 50 MHz","1 GHz – 10 GHz"],ans:2,ex:"Siêu âm chẩn đoán y tế dùng f = 2–50 MHz. Tần số cao cho độ phân giải tốt nhưng độ xuyên sâu kém; tần số thấp xuyên sâu hơn nhưng hình ảnh kém sắc nét."},
{id:11,chap:"Quang hình học & Kính hiển vi",badge:"badge-purple",diff:"easy",q:"Định luật Brewster phát biểu: ánh sáng phản xạ phân cực hoàn toàn khi góc Brewster iB thỏa:",opts:["sin iB = n","cos iB = n","tan iB = n","iB = arcsin(1/n)"],ans:2,ex:"<strong>Định luật Brewster:</strong> tan iB = n₂₁ (chiết suất tỷ đối). Khi đó tia phản xạ ⊥ tia khúc xạ và tia phản xạ phân cực hoàn toàn."},
{id:12,chap:"Quang hình học & Kính hiển vi",badge:"badge-purple",diff:"med",q:"Trong kính hiển vi điện tử quét (SEM), mẫu cần được phủ kim loại mỏng vì:",opts:["Tăng độ phân giải ảnh","Chống tích điện bề mặt dưới chùm electron","Cải thiện độ tương phản","Giảm thời gian quét"],ans:1,ex:"Mẫu không dẫn điện tích điện dưới chùm electron gây nhiễu ảnh và làm lệch chùm tia. Phủ Au, Au-Pd hoặc Pt mỏng (~5–20 nm) giúp dẫn điện, triệt tiêu tích điện."},
{id:13,chap:"Quang hình học & Kính hiển vi",badge:"badge-purple",diff:"easy",q:"Kính hiển vi quang học đạt độ phân giải cao nhất khi sử dụng:",opts:["Ánh sáng bước sóng dài (đỏ)","Ánh sáng bước sóng ngắn (UV) và vật kính dầu nhúng","Nguồn sáng đơn sắc vàng","Ánh sáng trắng thường"],ans:1,ex:"Giới hạn phân giải d ≈ λ/(2NA). Để giảm d: giảm λ (dùng UV) và tăng NA (dùng vật kính dầu nhúng nâng NA lên ~1,4). Kính hiển vi điện tử dùng e⁻ còn đạt độ phân giải tốt hơn."},
{id:14,chap:"Phân cực ánh sáng",badge:"badge-purple",diff:"med",q:"Theo định luật Malus, nếu ánh sáng phân cực cường độ I₁ chiếu qua kính phân tích đặt góc α = 60° so với mặt phẳng phân cực, cường độ ánh sáng ra là:",opts:["I₁/4","I₁/2","I₁√3/2","3I₁/4"],ans:0,ex:"<strong>Định luật Malus:</strong> I₂ = I₁cos²α = I₁cos²60° = I₁×(0,5)² = I₁/4."},
{id:15,chap:"Phân cực ánh sáng",badge:"badge-purple",diff:"easy",q:"Chất quang hoạt có tính 'quay phải' (+) có nghĩa là:",opts:["Làm quay mặt phẳng phân cực theo chiều kim đồng hồ khi nhìn về phía nguồn sáng","Làm quay mặt phẳng phân cực ngược chiều kim đồng hồ","Hấp thụ hoàn toàn ánh sáng phân cực","Không tương tác với ánh sáng phân cực"],ans:0,ex:"Chất quay phải (+) hay dextrorotatory (D) làm quay mặt phẳng dao động theo chiều kim đồng hồ (nhìn từ phía nguồn sáng tới). Ký hiệu (+), D. Ngược lại là (-), L (levorotatory)."},
{id:16,chap:"Phân cực ánh sáng",badge:"badge-purple",diff:"hard",q:"Theo định luật Biot mở rộng, dung dịch chứa 2 chất quang hoạt có [α₁]=+40°, C₁=0,5 g/mL; [α₂]=−25°, C₂=0,2 g/mL; l=2 dm. Góc quay tổng cộng φ là:",opts:["+40°","+30°","+20°","+50°"],ans:1,ex:"φ = ([α₁]C₁ + [α₂]C₂)×l = (40×0,5 + (−25)×0,2)×2 = (20−5)×2 = 15×2 = 30°. Áp dụng định luật Biot suy rộng: cộng đại số các góc quay riêng phần."},
{id:17,chap:"Nhiễu xạ ánh sáng",badge:"badge-coral",diff:"easy",q:"Đới cầu Fresnel thứ n chẵn (n = 2, 4, ...) đóng góp biên độ sóng nào đến điểm quan sát M?",opts:["Cùng pha với đới lẻ → tăng cường","Ngược pha với đới lẻ → triệt tiêu","Không có đóng góp","Cùng pha với mọi đới"],ans:1,ex:"Đới chẵn ngược pha với đới lẻ liền kề. Nếu lỗ tròn chứa đúng 2 đới, a = a₁/2 − a₂/2 ≈ 0 → điểm M tối hoàn toàn. Đới lẻ → sáng, đới chẵn → tối."},
{id:18,chap:"Nhiễu xạ ánh sáng",badge:"badge-coral",diff:"med",q:"Phương trình số đới Fresnel đối với nhiễu xạ qua khe hẹp chiều rộng a, góc nhiễu xạ φ là:",opts:["n = a·sinφ / λ","n = 2a·sinφ / λ","n = a·cosφ / λ","n = λ / (a·sinφ)"],ans:1,ex:"<strong>n = 2a·sinφ/λ</strong>. Cực tiểu nhiễu xạ khi n = 2k (chẵn): sinφ = kλ/a. Cực đại phụ khi n = 2k+1 (lẻ): sinφ = (k+1/2)λ/a."},
{id:19,chap:"Nhiễu xạ tia X",badge:"badge-coral",diff:"med",q:"Định luật Bragg cho nhiễu xạ tia X: 2d sinθ = nλ, trong đó d là:",opts:["Đường kính nguyên tử","Khoảng cách giữa các mặt phẳng mạng tinh thể","Bước sóng tia X","Chiều dài ô mạng"],ans:1,ex:"<strong>Định luật Bragg (Nobel 1915):</strong> 2d sinθ = nλ. d là khoảng cách giữa các mặt phẳng mạng song song (hkl). θ là góc Bragg. Khi điều kiện thỏa, các tia phản xạ tăng cường nhau → đỉnh nhiễu xạ XRD."},
{id:20,chap:"Nhiễu xạ tia X",badge:"badge-coral",diff:"hard",q:"Phương pháp XRD xác định kích thước hạt nano theo Scherrer: D = Kλ/(B·cosθ). Với λ = 0,154 nm, B = 0,00873 rad, θ = 20°, K = 0,89 thì D xấp xỉ:",opts:["8,4 nm","16,8 nm","4,2 nm","33,6 nm"],ans:1,ex:"D = Kλ/(Bcosθ) = 0,89×0,154/(0,00873×cos20°) = 0,13706/(0,00873×0,9397) ≈ 0,13706/0,008204 ≈ 16,7 nm ≈ 16,8 nm."},
{id:21,chap:"Nhiễu xạ tia X",badge:"badge-coral",diff:"easy",q:"Giản đồ XRD của vật liệu vô định hình cho thấy:",opts:["Các đỉnh nhọn sắc nét","Các đỉnh rộng và mờ (broad hump)","Không có tín hiệu nào","Đường nền phẳng hoàn toàn"],ans:1,ex:"Vật liệu vô định hình không có trật tự xa, chỉ có trật tự gần → XRD cho peak rộng, không sắc. Tinh thể cho peak nhọn đặc trưng. Bán tinh thể cho hỗn hợp cả hai."},
{id:22,chap:"Phổ UV-Vis & IR",badge:"badge-blue",diff:"easy",q:"Trong máy đo quang phổ UV-Vis, nguồn sáng phát vùng tử ngoại (UV, λ < 350 nm) là:",opts:["Đèn dây tóc Wolfram","Đèn Deuterium (D₂)","Đèn Xenon flash","Đèn LED"],ans:1,ex:"<strong>Đèn Deuterium (D₂)</strong> phát bức xạ liên tục trong vùng UV (200–350 nm). Đèn dây tóc W phát Vis (λ > 320 nm). Cả hai kết hợp phủ toàn dải 200–800 nm."},
{id:23,chap:"Phổ UV-Vis & IR",badge:"badge-blue",diff:"med",q:"Định luật Lambert-Beer: A = ε·C·l. Dung dịch có ε = 5000 L/(mol·cm), C = 2×10⁻⁵ mol/L, l = 1 cm. Độ hấp thụ A là:",opts:["0,05","0,10","0,25","1,00"],ans:1,ex:"A = ε×C×l = 5000 × 2×10⁻⁵ × 1 = 0,10. Độ truyền qua T = 10⁻ᴬ = 10⁻⁰·¹ ≈ 0,794 hay 79,4%."},
{id:24,chap:"Phổ UV-Vis & IR",badge:"badge-blue",diff:"med",q:"Phổ UV-Vis có dải hấp thụ rộng (so với phổ nguyên tử) vì:",opts:["Phân tử có nhiều điện tử hơn nguyên tử","Chuyển mức điện tử kèm theo dao động và quay phân tử","Nồng độ dung dịch lớn","Bước sóng nguồn sáng không ổn định"],ans:1,ex:"Năng lượng phân tử: E = Eđt + Edđ + Eq. Chuyển mức điện tử ΔEđt lớn, nhưng mỗi mức điện tử có nhiều mức dao động–quay → hấp thụ trải rộng thành dải."},
{id:25,chap:"Phổ UV-Vis & IR",badge:"badge-blue",diff:"easy",q:"Phổ IR (hồng ngoại) chủ yếu cung cấp thông tin về:",opts:["Chuyển mức điện tử trong phân tử","Dao động và quay của liên kết trong phân tử","Cấu trúc tinh thể vật liệu","Nồng độ ion trong dung dịch"],ans:1,ex:"IR kích thích dao động phân tử (NIR, MIR: 0,8–50 μm). Mỗi nhóm chức có tần số dao động đặc trưng → IR là 'vân tay' phân tử để nhận biết cấu trúc."},
{id:26,chap:"Huỳnh quang & Lân quang",badge:"badge-teal",diff:"easy",q:"Quy tắc Kasha (Kasha's rule) trong quang phổ huỳnh quang phát biểu:",opts:["Cường độ huỳnh quang tỉ lệ với nồng độ","Phát xạ huỳnh quang luôn xảy ra từ mức năng lượng thấp nhất của S₁","Bước sóng phát xạ bằng bước sóng kích thích","Hiệu suất lượng tử luôn bằng 1"],ans:1,ex:"<strong>Quy tắc Kasha:</strong> dù kích thích ở bất kỳ bước sóng nào (S₂, S₃...), phân tử hồi phục về S₁ thấp nhất qua IC rồi mới phát xạ. Do đó phổ phát xạ không đổi khi thay đổi bước sóng kích thích."},
{id:27,chap:"Huỳnh quang & Lân quang",badge:"badge-teal",diff:"med",q:"Hiệu ứng Stokes trong huỳnh quang có nghĩa là:",opts:["Ánh sáng phát xạ có bước sóng ngắn hơn ánh sáng kích thích","Ánh sáng phát xạ có bước sóng dài hơn (năng lượng thấp hơn) ánh sáng kích thích","Cường độ phát xạ bằng cường độ kích thích","Phân tử trở về S₀ mà không phát photon"],ans:1,ex:"<strong>Dịch chuyển Stokes:</strong> λ_phát xạ > λ_kích thích vì phân tử mất bớt năng lượng qua IC/VR trước khi phát xạ. Δλ = λ_phát − λ_kích gọi là Stokes shift."},
{id:28,chap:"Huỳnh quang & Lân quang",badge:"badge-teal",diff:"easy",q:"So với huỳnh quang, lân quang (phosphorescence) có thời gian sống phát xạ:",opts:["Ngắn hơn (ns)","Tương đương nhau","Dài hơn nhiều (ms – s)","Không xác định được"],ans:2,ex:"Huỳnh quang từ S₁ (singlet): τ ≈ 10⁻⁹–10⁻⁷ s. Lân quang từ T₁ (triplet): τ ≈ 10⁻³–10² s. Lân quang kéo dài vì chuyển T₁→S₀ bị cấm về spin."},
{id:29,chap:"Huỳnh quang & Lân quang",badge:"badge-teal",diff:"hard",q:"Hiệu suất lượng tử Q = Γ/(Γ + k_nr). Nếu Γ = 5×10⁸ s⁻¹ và k_nr = 2×10⁸ s⁻¹ thì Q và thời gian sống τ lần lượt là:",opts:["Q ≈ 0,71 ; τ ≈ 1,43 ns","Q ≈ 0,50 ; τ ≈ 1,00 ns","Q ≈ 0,83 ; τ ≈ 1,67 ns","Q ≈ 0,29 ; τ ≈ 2,00 ns"],ans:0,ex:"Q = Γ/(Γ+knr) = 5×10⁸/(5×10⁸+2×10⁸) = 5/7 ≈ 0,714. τ = 1/(Γ+knr) = 1/(7×10⁸) ≈ 1,43×10⁻⁹ s = 1,43 ns."},
{id:30,chap:"Phân tích nhiệt",badge:"badge-amber",diff:"easy",q:"Phép đo DSC (Differential Scanning Calorimetry) khảo sát đại lượng nào?",opts:["Sự thay đổi khối lượng theo nhiệt độ","Dòng nhiệt lượng (Q) khi quét nhiệt","Độ lệch nhiệt độ giữa mẫu và tham chiếu","Sự giãn nở cơ học theo nhiệt độ"],ans:1,ex:"<strong>DSC</strong> đo dòng nhiệt lượng Q cần để duy trì nhiệt độ mẫu = mẫu tham chiếu. Cho biết ΔH của quá trình chuyển pha. Khác với DTA đo ΔT, TGA đo Δm, TMA đo ΔL."},
{id:31,chap:"Phân tích nhiệt",badge:"badge-amber",diff:"med",q:"Trong giản đồ DTA/DSC, đỉnh thu nhiệt (endotherm) thể hiện sự kiện nào?",opts:["Kết tinh","Oxy hóa","Nóng chảy hoặc chuyển pha thu nhiệt","Phân hủy tỏa nhiệt"],ans:2,ex:"Thu nhiệt (lệch xuống trong DTA): nóng chảy, bay hơi, thăng hoa, chuyển thể thủy tinh, dehydrate hóa. Tỏa nhiệt (lệch lên): kết tinh, oxy hóa, phân hủy tỏa nhiệt, polyme hóa."},
{id:32,chap:"Phân tích nhiệt",badge:"badge-amber",diff:"med",q:"DSC được ứng dụng để xác định độ tinh khiết dựa trên phương trình nào?",opts:["Phương trình Scherrer","Phương trình Poiseuille","Phương trình Van't Hoff","Phương trình Bragg"],ans:2,ex:"<strong>Phương pháp nghiệm lạnh:</strong> Ti = T₀ − R·T₀²·X₁/(ΔH·F). Dựa trên phương trình Van't Hoff mở rộng. Tạp chất làm hạ điểm nóng chảy T₀ → tính được nồng độ tạp X từ độ dốc đường Ti vs 1/Fi."},
{id:33,chap:"Phân tích nhiệt",badge:"badge-amber",diff:"easy",q:"TGA (Thermogravimetric Analysis) đo:",opts:["Nhiệt lượng chuyển pha","Sự thay đổi khối lượng mẫu theo nhiệt độ","Độ giãn nở nhiệt","Điện thế nhiệt điện"],ans:1,ex:"TGA đo Δm = f(T). Trong dược học dùng xác định hàm ẩm, mất dung môi kết tinh, độ phân hủy nhiệt. Đường DTG (đạo hàm TGA) cho tốc độ phân hủy cực đại."},
{id:34,chap:"Vật lý hạt nhân",badge:"badge-coral",diff:"easy",q:"Trong ba loại tia phóng xạ, tia nào có khả năng đâm xuyên mạnh nhất?",opts:["Tia alpha (α)","Tia beta (β)","Tia gamma (γ)","Tất cả như nhau"],ans:2,ex:"<strong>Tia gamma (γ)</strong> là sóng điện từ, không mang điện → đâm xuyên mạnh nhất, qua lớp chì dày hàng chục cm. Tia α yếu nhất (vài cm không khí). Tia β trung gian (vài mét không khí)."},
{id:35,chap:"Vật lý hạt nhân",badge:"badge-coral",diff:"med",q:"Kỹ thuật PET (Positron Emission Tomography) sử dụng đồng vị phóng xạ phát ra:",opts:["Tia alpha (α)","Tia beta⁻ (β⁻)","Tia beta⁺ (β⁺ = positron)","Tia gamma trực tiếp"],ans:2,ex:"PET dùng đồng vị phát β⁺ (positron, như ¹⁸F, ¹¹C). Positron gặp electron → hủy cặp → 2 photon gamma 511 keV đi ngược chiều 180° → máy PET ghi đồng thời để tái dựng ảnh 3D."},
{id:36,chap:"Vật lý hạt nhân",badge:"badge-coral",diff:"easy",q:"Chu kỳ bán rã T₁/₂ được định nghĩa là:",opts:["Thời gian để toàn bộ chất phóng xạ phân rã","Thời gian để số hạt nhân phóng xạ giảm còn một nửa","Thời gian để năng lượng phóng xạ giảm 90%","Thời gian trung bình sống của hạt nhân"],ans:1,ex:"<strong>T₁/₂:</strong> N(t) = N₀·e⁻λt, tại t = T₁/₂: N = N₀/2 → T₁/₂ = ln2/λ ≈ 0,693/λ. Mỗi đồng vị có T₁/₂ đặc trưng, bất biến với T, P, môi trường hóa học."},
{id:37,chap:"Vật lý hạt nhân",badge:"badge-coral",diff:"hard",q:"Mẫu phóng xạ ban đầu có N₀ = 8×10⁶ hạt, T₁/₂ = 3 giờ. Sau 9 giờ, số hạt nhân còn lại là:",opts:["4×10⁶","2×10⁶","1×10⁶","0,5×10⁶"],ans:2,ex:"Số chu kỳ: n = 9/3 = 3. N = N₀×(1/2)³ = 8×10⁶/8 = 1×10⁶. Sau mỗi T₁/₂ số hạt giảm một nửa."},
{id:38,chap:"Nhiễu xạ tia X",badge:"badge-coral",diff:"hard",q:"Mạng lập phương đơn giản có hằng số mạng a = 0,3 nm. Với λ = 0,154 nm, góc Bragg θ cho mặt (100) bậc n = 1 là:",opts:["14,9°","30,7°","7,4°","24,1°"],ans:0,ex:"d₁₀₀ = a = 0,3 nm. 2d sinθ = nλ → sinθ = λ/(2d) = 0,154/(2×0,3) = 0,154/0,6 ≈ 0,257 → θ = arcsin(0,257) ≈ 14,9°."},
{id:39,chap:"Quang hình học & Kính hiển vi",badge:"badge-purple",diff:"med",q:"SAED (Selected Area Electron Diffraction) trong TEM của đơn tinh thể cho pattern:",opts:["Các vạch thẳng song song","Mảng điểm sáng đối xứng (spot pattern)","Vòng tròn đồng tâm","Phổ liên tục mờ"],ans:1,ex:"SAED: đơn tinh thể → mảng điểm (spot pattern) đối xứng phản ánh đối xứng mạng. Đa tinh thể → vòng tròn Debye-Scherrer. Vô định hình → vòng mờ rộng."},
{id:40,chap:"Phân cực ánh sáng",badge:"badge-purple",diff:"hard",q:"Trong kính hiển vi phân cực, vật thể có tính lưỡng chiết xuất hiện màu sắc do:",opts:["Vật hấp thụ chọn lọc bước sóng","Phân cực hiện sắc: hiệu quang lộ giữa tia O và tia E phụ thuộc λ gây giao thoa màu","Nguồn sáng tự phát màu qua tinh thể","Bộ lọc màu trong kính tạo màu nhân tạo"],ans:1,ex:"Trong tinh thể lưỡng chiết, n_O ≠ n_E → hiệu quang lộ δ = (n_O − n_E)×d phụ thuộc λ → giao thoa chọn lọc theo bước sóng → màu sắc (phân cực hiện sắc)."}
];

const CHAP_BADGE={
"Cơ học chất lỏng":"badge-blue",
"Hiện tượng bề mặt":"badge-teal",
"Siêu âm":"badge-amber",
"Quang hình học & Kính hiển vi":"badge-purple",
"Phân cực ánh sáng":"badge-purple",
"Nhiễu xạ ánh sáng":"badge-coral",
"Nhiễu xạ tia X":"badge-coral",
"Phổ UV-Vis & IR":"badge-blue",
"Huỳnh quang & Lân quang":"badge-teal",
"Phân tích nhiệt":"badge-amber",
"Vật lý hạt nhân":"badge-coral"
};

let ST={cur:0,ans:new Array(40).fill(null),shown:new Array(40).fill(false),sec:90*60,running:false,done:false};
let TI=null;

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function dt(d){return`<span class="diff-tag diff-${d==='easy'?'easy':d==='med'?'med':'hard'}">${d==='easy'?'Dễ':d==='med'?'Trung bình':'Khó'}</span>`}
function sc(){return ST.ans.reduce((a,v,i)=>a+(v===QS[i].ans?1:0),0)}

function render(){
  const app=document.getElementById('app');
  if(ST.done){renderResult(app);return;}
  const q=QS[ST.cur];
  const sel=ST.ans[ST.cur];
  const rev=ST.shown[ST.cur];
  const done=ST.ans.filter(v=>v!==null).length;
  app.innerHTML=`
<div class="exam-header">
  <div class="exam-title">Đề thi Vật Lý Ứng Dụng K80</div>
  <div class="exam-sub">40 câu • 90 phút • Có lý thuyết và bài tập tính toán</div>
</div>
<div class="exam-body">
  <div class="timer-bar">
    <div>
      <div class="timer-clock" id="tclock">${fmt(ST.sec)}</div>
      <div class="timer-label">thời gian còn lại</div>
    </div>
    <div class="timer-btns">
      <button class="btn" onclick="tog()">${ST.running?'⏸ Dừng':'▶ Bắt đầu'}</button>
      <button class="btn btn-danger" onclick="sub()">Nộp bài</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-row"><span>Đã trả lời: ${done}/40</span><span>Câu ${ST.cur+1}/40</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${done/40*100}%"></div></div>
  </div>
  <div class="nav-grid">
    ${QS.map((_,i)=>{
      let c='nav-btn';
      if(i===ST.cur)c+=' current';
      else if(ST.ans[i]!==null)c+=' answered';
      return`<button class="${c}" onclick="go(${i})">${i+1}</button>`;
    }).join('')}
  </div>
  <div class="section-badge ${q.badge}">${q.chap}</div>
  <div class="q-num">Câu ${ST.cur+1} / 40 ${dt(q.diff)}</div>
  <div class="q-text">${q.q}</div>
  <div class="opts">
    ${q.opts.map((o,i)=>{
      let c='opt';
      if(rev){if(i===q.ans)c+=' correct';else if(i===sel)c+=' wrong';}
      else if(i===sel)c+=' selected';
      return`<div class="${c}" onclick="pick(${i})"><span class="opt-key">${'ABCD'[i]}.</span><span>${o}</span></div>`;
    }).join('')}
  </div>
  ${rev?`<div class="explanation"><strong>Giải thích:</strong> ${q.ex}</div>`:''}
  <div class="q-nav">
    <button class="btn" onclick="go(${Math.max(0,ST.cur-1)})" ${ST.cur===0?'disabled':''}>← Trước</button>
    <button class="btn" onclick="togEx()">${rev?'Ẩn giải thích':'Xem giải thích'}</button>
    <button class="btn btn-primary" onclick="go(${Math.min(39,ST.cur+1)})" ${ST.cur===39?'disabled':''}>Tiếp →</button>
  </div>
</div>`;
}

function renderResult(app){
  const total=40,s=sc(),p=Math.round(s/total*100);
  const grade=p>=80?'Xuất sắc':p>=65?'Khá':p>=50?'Trung bình':'Cần ôn lại';
  const chaps=[...new Set(QS.map(q=>q.chap))];
  const chapRows=chaps.map(c=>{
    const qs=QS.filter(q=>q.chap===c);
    const cor=qs.filter((q,_,__)=>ST.ans[QS.indexOf(q)]===q.ans).length;
    const pct=Math.round(cor/qs.length*100);
    const badge=CHAP_BADGE[c]||'badge-blue';
    return`<div class="chap-row">
      <span class="section-badge ${badge}" style="margin:0;font-size:10px">${c}</span>
      <div class="chap-bar"><div class="chap-bar-fill" style="width:${pct}%"></div></div>
      <span class="chap-score" style="color:${pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}">${cor}/${qs.length}</span>
    </div>`;
  }).join('');
  app.innerHTML=`
<div class="exam-header">
  <div class="exam-title">Kết quả — Đề thi Vật Lý Ứng Dụng K80</div>
  <div class="exam-sub">40 câu • 90 phút</div>
</div>
<div class="result-hero">
  <div class="result-score">${s}/${total}</div>
  <div class="result-label">${p}%</div>
  <div class="result-grade">${grade}</div>
</div>
<div class="result-stats">
  <div class="stat"><div class="stat-n" style="color:var(--green)">${s}</div><div class="stat-l">Đúng</div></div>
  <div class="stat"><div class="stat-n" style="color:var(--red)">${total-s}</div><div class="stat-l">Sai</div></div>
  <div class="stat"><div class="stat-n">${ST.ans.filter(v=>v===null).length}</div><div class="stat-l">Bỏ qua</div></div>
</div>
<div class="result-actions">
  <button class="btn btn-primary" onclick="review()">Xem lại đáp án</button>
  <button class="btn" onclick="restart()">Làm lại từ đầu</button>
</div>
<div class="section-title">Kết quả theo chương</div>
<div class="chap-results">${chapRows}</div>`;
}

function go(i){ST.cur=i;render();}
function pick(i){if(ST.done)return;ST.ans[ST.cur]=i;render();}
function togEx(){ST.shown[ST.cur]=!ST.shown[ST.cur];render();}
function tog(){
  if(ST.running){clearInterval(TI);ST.running=false;}
  else{
    ST.running=true;
    TI=setInterval(()=>{
      if(ST.sec<=0){clearInterval(TI);ST.done=true;render();return;}
      ST.sec--;
      const el=document.getElementById('tclock');
      if(el){el.textContent=fmt(ST.sec);if(ST.sec<=300)el.style.color='var(--red)';}
    },1000);
  }
  render();
}
function sub(){clearInterval(TI);ST.running=false;ST.done=true;render();}
function review(){ST.done=false;ST.cur=0;ST.shown=new Array(40).fill(true);render();}
function restart(){
  clearInterval(TI);
  ST={cur:0,ans:new Array(40).fill(null),shown:new Array(40).fill(false),sec:90*60,running:false,done:false};
  TI=null;render();
}
render();
</script>
</body>
</html>
