let currentFilter = "all";
let currentSearch = "";

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

function matchesFilter(card) {
  if (currentFilter === "all") return true;
  if (currentFilter === "hat-kin") return card.group === "hat-kin-2";
  if (currentFilter === "mot-la-mam") return card.group === "mot-la-mam";
  if (currentFilter === "hat-tran") return card.group === "hat-tran";
  if (currentFilter === "duong-xi") return card.group === "duong-xi";
  if (currentFilter === "tinh-dau") {
    return card.tags.some(t => t.toLowerCase().includes("tinh dầu") || t.toLowerCase().includes("mùi thơm")) ||
           card.tomtat.toLowerCase().includes("tinh dầu") || card.meo.toLowerCase().includes("thơm");
  }
  if (currentFilter === "than-vuong") {
    return card.tags.some(t => t.includes("vuông")) || card.meo.toLowerCase().includes("vuông");
  }
  if (currentFilter === "latex") {
    return card.tags.some(t => t.toLowerCase().includes("nhựa") || t.toLowerCase().includes("mủ")) ||
           card.tomtat.toLowerCase().includes("mủ");
  }
  return true;
}

function matchesSearch(card) {
  if (!currentSearch) return true;
  const q = currentSearch.toLowerCase();
  return card.sci.toLowerCase().includes(q) ||
    card.viet.toLowerCase().includes(q) ||
    card.tomtat.toLowerCase().includes(q) ||
    card.meo.toLowerCase().includes(q) ||
    card.tags.some(t => t.toLowerCase().includes(q)) ||
    card.hinh_thai.some(h => h.toLowerCase().includes(q)) ||
    card.cay_dd.some(c => c.toLowerCase().includes(q));
}

  const container = document.getElementById("cardsContainer");
  container.innerHTML = "";
  const q = currentSearch;
  let count = 0;
  let lastGroup = null;

  const filtered = DATA.filter(d => matchesFilter(d) && matchesSearch(d));
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">Không tìm thấy kết quả phù hợp</div>';
    return;
  }

  GROUP_ORDER.forEach(grp => {
    const groupCards = filtered.filter(d => d.group === grp);
    if (groupCards.length === 0) return;
    
    const gh = document.createElement("div");
    gh.className = "group-header";
    gh.textContent = GROUPS[grp];
    container.appendChild(gh);

    groupCards.forEach(d => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.stt = d.stt;
      
      const tagsHtml = d.tags.map(t => {
        const cls = t.includes("lá mầm") || t.includes("Hạt") || t.includes("Dương xỉ") ? "tag-group" :
                    t.includes("Alkaloid") || t.includes("tinh dầu") || t.includes("Glycoside") || t.includes("Saponin") ? "tag-chem" : "tag-key";
        return `<span class="tag ${cls}">${highlight(t, q)}</span>`;
      }).join("");

      const plantsHtml = d.cay_dd.map(c => `<span class="plant-pill">${highlight(c, q)}</span>`).join("");
      const featuresHtml = d.hinh_thai.map(h => `<li>${highlight(h, q)}</li>`).join("");

      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${d.stt})">
          <div class="stt-badge" style="background:${d.color}">${d.stt}</div>
          <div class="card-names">
            <div class="sci-name">${highlight(d.sci, q)}</div>
            <div class="viet-name">Họ ${highlight(d.viet, q)}</div>
          </div>
          <div class="expand-icon">⌄</div>
        </div>
        <div class="tags-row">${tagsHtml}</div>
        <div class="expand-panel">
          <div class="section-title">📋 Đặc điểm hình thái</div>
          <ul class="feature-list">${featuresHtml}</ul>
          
          <div class="trick-box">
            <div class="trick-label">🔑 MẸO NHẬN DẠNG NHANH</div>
            <div class="trick-text">${highlight(d.meo, q)}</div>
          </div>
          
          <div class="section-title" style="margin-top:14px">🌿 Cây đại diện làm thuốc</div>
          <div class="rep-plants">${plantsHtml}</div>
        </div>
      `;
      container.appendChild(card);
      count++;
    });
  });

  document.querySelector('[data-filter="all"]').textContent = `Tất cả (${DATA.length})`;
}

function toggleCard(stt) {
  const card = document.querySelector(`.card[data-stt="${stt}"]`);
  if (!card) return;
  const isExpanded = card.classList.contains("expanded");
  document.querySelectorAll(".card.expanded").forEach(c => c.classList.remove("expanded"));
  if (!isExpanded) {
    card.classList.add("expanded");
    setTimeout(() => card.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50);
  }
}

document.getElementById("searchInput").addEventListener("input", function() {
  currentSearch = this.value.trim();
  renderCards();
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    currentFilter = this.dataset.filter;
    renderCards();
  });
});

renderCards();
</script>
</body>
</html>
